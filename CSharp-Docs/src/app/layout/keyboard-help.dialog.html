<div class="kb-dialog">
    <header class="kb-head">
        <p class="eyebrow">Shortcuts</p>
        <h2 class="kb-title">Move faster.</h2>
        <button type="button" class="kb-close" (click)="close()" aria-label="Close (Esc)">
            <span class="material-symbols-rounded">close</span>
        </button>
    </header>

    <div class="kb-body">
        @for (group of groups; track group.label) {
        <section class="kb-group">
            <p class="kb-group-label eyebrow">{{ group.label }}</p>
            <ul class="kb-list">
                @for (entry of group.entries; track entry.description) {
                <li class="kb-row">
                    <span class="kb-keys">
                        @for (k of entry.keys; track $index) {
                        <kbd>{{ k }}</kbd>
                        }
                    </span>
                    <span class="kb-desc">{{ entry.description }}</span>
                </li>
                }
            </ul>
        </section>
        }
    </div>

    <footer class="kb-foot">
        <span class="kb-foot-brand">
            <img src="assets/brand/forte-mark.svg" alt="" width="14" height="14" />
            Forte
        </span>
        <span class="kb-foot-hint">Press <kbd>Esc</kbd> to close</span>
    </footer>
</div>
