<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Forte">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <!--
    Sharp (♯) — sits behind the f, muted, marks the C# nod.
    Two horizontal bars + two vertical bars, slight slant.
  -->
  <g opacity="0.32" stroke="url(#fg)" stroke-width="2.2" stroke-linecap="round">
    <line x1="14" y1="22" x2="36" y2="20"/>
    <line x1="14" y1="34" x2="36" y2="32"/>
    <line x1="20" y1="14" x2="20" y2="40"/>
    <line x1="30" y1="13" x2="30" y2="39"/>
  </g>

  <!--
    Italic serif lowercase 'f' rendered as a path. The strong vertical
    stem with curved terminals is the "forte" mark in music notation
    repurposed as the brand logomark.
  -->
  <path
    d="M 36 12
       Q 44 10 48 16
       L 47 21
       Q 43 17 39 19
       Q 36 22 35 28
       L 33 36
       L 41 36
       L 40 41
       L 32 41
       L 28 56
       Q 26 60 22 60
       Q 19 60 19 57
       Q 19 55 21 54
       Q 23 53 24 51
       L 28 41
       L 22 41
       L 23 36
       L 29 36
       L 31 28
       Q 33 17 36 12 Z"
    fill="url(#fg)"/>
</svg>