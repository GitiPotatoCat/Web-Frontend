<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-label="Forte">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <!-- Leading sharp -->
  <g opacity="0.55" stroke="url(#wg)" stroke-width="1.6" stroke-linecap="round">
    <line x1="6"  y1="28" x2="22" y2="26"/>
    <line x1="6"  y1="38" x2="22" y2="36"/>
    <line x1="10" y1="20" x2="10" y2="46"/>
    <line x1="18" y1="19" x2="18" y2="45"/>
  </g>

  <!--
    "Forte" set in italic Fraunces. We render the wordmark as text
    so it picks up font-loading and the brand gradient via fill="url()".
    If Fraunces isn't loaded yet, the system fallback (Georgia, serif)
    keeps the italic weight so the layout doesn't shift on font swap.
  -->
  <text
    x="34"
    y="48"
    font-family="Fraunces, Georgia, serif"
    font-size="44"
    font-style="italic"
    font-weight="500"
    fill="url(#wg)"
    letter-spacing="-1.2">Forte</text>
</svg>