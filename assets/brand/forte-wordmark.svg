<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" preserveAspectRatio="xMidYMid slice" role="presentation">
  <defs>
    <filter id="aurora-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" result="blur" />
    </filter>
  </defs>
  
  <rect width="1000" height="400" fill="#0F172A" />

  <g filter="url(#aurora-blur)" opacity="0.6">
    <circle cx="200" cy="100" r="150" fill="#6366F1">
      <animate attributeName="cx" values="200;300;200" dur="15s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="300" r="180" fill="#A855F7">
      <animate attributeName="cy" values="300;100;300" dur="20s" repeatCount="indefinite" />
    </circle>
    <circle cx="500" cy="200" r="100" fill="#EC4899">
      <animate attributeName="r" values="100;150;100" dur="12s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
